button_card_templates:
  room_card:
    show_state: false
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    card_mod:
      style: |
        :host {
          margin: 0 !important;
        }
    styles:
      grid:
        - grid-template-areas: '"n btn" "s btn" "i btn"'
        - grid-template-columns: 1fr min-content
        - grid-template-rows: min-content min-content 1fr
      card:
        - padding: 10px 10px 15px 15px
        - max-width: 100%
        - aspect-ratio: 1 / 1
        - box-sizing: border-box
      custom_fields:
        btn:
          - justify-content: end
          - align-self: start
      name:
        - justify-self: start
        - align-self: start
        - font-size: 0.9em
        - font-weight: 500
        - padding-top: 6px;
        - color: var(--secondary-text-color)
      state:
        - min-height: 80px
        - justify-self: start
        - align-self: start
        - font-size: 0.7px
        - font-weight: 500
        - color: rgba(96, 114, 116, 0.7)
      img_cell:
        - justify-content: start
        - position: absolute
        - width: 80%
        - height: 80%
        - left: 0
        - bottom: 0
        - margin: 0 0 -15px -15px
        - background: >
            [[[ return entity.state === 'on' || entity.state === 'open' ||
            entity.state === 'opening' || entity.state === 'closing' ?
            'rgba(222, 225, 249)' : 'rgba(158, 158, 158, 0.2)'; ]]]
        - border-radius: 500px
        - opacity: '0.7'
      icon:
        - width: 75%
        - color: >
            [[[ return entity.state === 'on' || entity.state === 'open' ||
            entity.state === 'opening' || entity.state === 'closing' ?
            'rgba(111, 125, 239)' : 'rgba(158, 158, 158)'; ]]]
        - margin-left: 20px;
        - opacity: '0.9'
  room_button_base:
    show_name: false
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    extra_styles: |
      @media screen and (max-width: 800px) {
        #card {
           width: 25px !important;
           height: 25px !important;
        }
      }
    styles:
      card:
        - padding: 5px
        - width: 30px
        - height: 30px
        - border-radius: 99px
        - background: rgba(158, 158, 158, 0.2)
      icon:
        - color: rgba(158, 158, 158)
        - width: 22px
  room_button:
    template: room_button_base
    state:
      - value: 'on'
        styles:
          card:
            - background: rgba(222, 225, 249)
          icon:
            - color: rgba(111, 125, 239)
      - value: open
        styles:
          card:
            - background: rgba(222, 225, 249)
          icon:
            - color: rgba(111, 125, 239)
      - value: opening
        styles:
          card:
            - background: rgba(222, 225, 249)
          icon:
            - color: rgba(111, 125, 239)
      - value: closing
        styles:
          card:
            - background: rgba(222, 225, 249)
          icon:
            - color: rgba(111, 125, 239)